<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>index</title>
  <meta name="description" content="Landing verticale d'impatto con stile dolce-premium, CTA ridisegnata e palette rosata." />
  <style>
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.92rem, 0.88rem + 0.25vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.12rem, 1rem + 0.7vw, 1.4rem);
      --text-xl: clamp(1.45rem, 1.25rem + 1vw, 2rem);
      --space-2: .5rem;
      --space-3: .75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --radius-md: 1rem;
      --radius-lg: 1.4rem;
      --radius-xl: 2rem;
      --bg: #120811;
      --panel: #1b0d19;
      --text: rgba(255,255,255,.97);
      --muted: rgba(255,230,241,.78);
      --soft: rgba(255,215,231,.50);
      --pink: #ff4ca7;
      --pink-2: #ff84c4;
      --pink-3: #ffd2e8;
      --pink-4: #fff3fa;
      --shadow: 0 28px 70px rgba(0,0,0,.42);
      --glow: 0 0 60px rgba(255, 96, 174, .18);
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 87, 170, .24), transparent 24%),
        radial-gradient(circle at 35% 28%, rgba(255, 197, 226, .10), transparent 22%),
        linear-gradient(180deg, #090406 0%, #13080f 100%);
    }
    img { display: block; width: 100%; height: auto; }
    a { color: inherit; text-decoration: none; }
    .frame {
      width: min(100%, 430px);
      min-height: min(920px, 100dvh - 28px);
      padding: 12px;
      border-radius: 2.25rem;
      background: linear-gradient(180deg, rgba(43,20,37,.92), rgba(16,8,15,.98));
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: var(--shadow), var(--glow);
    }
    .card {
      position: relative;
      min-height: 790px;
      border-radius: 2rem;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 16%, rgba(255,110,185,.24), transparent 26%),
        linear-gradient(180deg, #23101c 0%, #0c0509 100%);
      border: 1px solid rgba(255,255,255,.08);
      isolation: isolate;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 1.55rem;
      border: 1px solid rgba(255, 214, 236, .18);
      z-index: 1;
      pointer-events: none;
    }
    .photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      transform: scale(1.04);
      filter: brightness(.92) saturate(1.03) contrast(1.02);
    }
    .veil {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 118, 190, .18), transparent 24%),
        linear-gradient(180deg, rgba(16,8,12,.16) 0%, rgba(20,7,15,.08) 26%, rgba(20,7,15,.14) 48%, rgba(11,4,8,.68) 78%, rgba(8,3,6,.94) 100%);
      z-index: 1;
    }
    .content {
      position: relative;
      z-index: 2;
      min-height: 790px;
      display: flex;
      flex-direction: column;
      padding: 24px 20px 18px;
    }
    .top { text-align: center; }
    .eyebrow {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .24em;
      color: var(--muted);
      margin-bottom: .35rem;
    }
    .brand {
      font-size: var(--text-xl);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -.03em;
    }
    .bubble {
      align-self: flex-end;
      margin-top: 14px;
      width: min(100%, 220px);
      background: rgba(58, 32, 48, .70);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(16px);
      border-radius: 1.35rem;
      padding: 10px 14px;
      box-shadow: 0 18px 34px rgba(0,0,0,.22);
    }
    .bubble-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      color: var(--muted);
      font-size: var(--text-sm);
      margin-bottom: .25rem;
    }
    .bubble-left {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      font-weight: 800;
      color: var(--text);
    }
    .dot {
      width: .68rem;
      height: .68rem;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 14px rgba(255,255,255,.6);
      flex: 0 0 auto;
    }
    .online-dot {
      background: #56f27d;
      box-shadow: 0 0 14px rgba(86,242,125,.75);
    }
    .bubble strong {
      display: block;
      font-size: clamp(1.2rem, 1.05rem + .45vw, 1.45rem);
      line-height: 1.06;
      font-weight: 800;
    }
    .mid-tag {
      margin-top: auto;
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .55rem .9rem;
      border-radius: 999px;
      background: rgba(255, 204, 229, .10);
      border: 1px solid rgba(255, 217, 236, .18);
      color: var(--pink-3);
      font-size: var(--text-xs);
      letter-spacing: .16em;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
      margin-bottom: 14px;
    }
    .mid-tag::before {
      content: "";
      width: .5rem;
      height: .5rem;
      border-radius: 50%;
      background: var(--pink-2);
      box-shadow: 0 0 12px rgba(255,132,196,.8);
    }
    .headline {
      font-size: clamp(2.3rem, 1.9rem + 1.8vw, 3.3rem);
      line-height: .86;
      letter-spacing: -.07em;
      text-transform: uppercase;
      font-weight: 900;
      max-width: 9ch;
      color: var(--pink-4);
      text-shadow: 0 14px 34px rgba(255,76,167,.18);
    }
    .headline em { font-style: normal; color: var(--pink-2); }
    .sub {
      margin-top: 12px;
      max-width: 18ch;
      font-size: var(--text-lg);
      color: var(--muted);
    }
    .cta {
      position: relative;
      margin-top: 24px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 16px 14px 16px 18px;
      border-radius: 1.85rem;
      background: linear-gradient(180deg, rgba(255,247,251,.94) 0%, rgba(255,237,246,.90) 100%);
      border: 1px solid rgba(255,255,255,.65);
      box-shadow: 0 20px 40px rgba(0,0,0,.28), 0 0 38px rgba(255, 122, 191, .12);
      overflow: hidden;
      isolation: isolate;
    }
    .cta::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,.14), transparent 35%, transparent 70%, rgba(255,255,255,.1));
      z-index: -1;
    }
    .cta-copy {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .cta-meta {
      display: block;
      font-size: var(--text-xs);
      letter-spacing: .17em;
      text-transform: uppercase;
      font-weight: 800;
      color: rgba(69,38,53,.62);
    }
    .cta-main {
      display: block;
      font-size: clamp(2rem, 1.75rem + .8vw, 2.55rem);
      line-height: .92;
      letter-spacing: -.05em;
      text-transform: uppercase;
      font-weight: 900;
      color: #ff3f9f;
    }
    .cta-icon {
      width: 74px;
      height: 74px;
      border-radius: 1.25rem;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: #fff;
      font-size: 2.15rem;
      background: radial-gradient(circle at 30% 30%, #ffb4db 0%, #ff78bf 32%, #d84b9b 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.45),
        0 12px 22px rgba(171,49,114,.24);
    }
    .footer {
      text-align: center;
      color: var(--soft);
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: var(--text-xs);
      margin-top: 18px;
      padding-bottom: 2px;
    }
    @media (max-width: 390px) {
      body { padding: 10px; }
      .frame { padding: 10px; border-radius: 1.85rem; }
      .card, .content { min-height: 710px; }
      .content { padding: 20px 16px 16px; }
      .bubble { width: min(100%, 255px); padding: 12px 14px; }
      .headline { font-size: 2.1rem; }
      .cta { grid-template-columns: 1fr 64px; padding: 12px 12px 12px 16px; }
      .cta-main { font-size: 1.7rem; }
      .cta-icon { width: 64px; height: 64px; font-size: 1.8rem; border-radius: 1rem; }
    }
  </style>
</head>
<body>
  <main class="frame">
    <section class="card" aria-label="Landing originale d'impatto">
      <img class="photo" src="./assets/model.jpg" alt="Creator sorridente in posa in ambiente interno" width="1200" height="1800" />
      <div class="veil" aria-hidden="true"></div>
      <div class="content">
        <header class="top">
          <p class="eyebrow">Le mie piattaforme ufficiali</p>
          <h1 class="brand">Alice Milena</h1>
        </header>
        
        <div class="mid-tag">Accesso riservato</div>
        <div>
          <p class="headline headline-custom">Ho lasciato<br>qualcosa<br><em>solo per<br>te qui</em><br>dentro....</p>
          <p class="sub"></p>
          <a class="cta" href="https://onlyfans.com/milenagrazia/c73" target="_blank" rel="noopener noreferrer" aria-label="Entra qui">
            <div class="cta-copy">
              <span class="cta-main">Entra qui</span>
            </div>
            <span class="cta-icon" aria-hidden="true">↗</span>
          </a>
          <p class="footer">© Alice Milena 2026</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
